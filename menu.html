<main>
    <div class="container" id="hero">
        <img src="arvaci-ASSETS/heromenu.jpg" alt="Arvaci menu image">
    </div>

    <div class="container" id="best-sellers">
        <h2 class="fade-up">Best sellers</h2>
        <div class="grid-wrapper">
            <div class="best-seller-card fade-up">
                <img src="arvaci-ASSETS/bestseller1.jpg" alt="Best seller item 1 — replace with a real photo">
                <h4>Raspberry Tart</h4>
            </div>
            <div class="best-seller-card fade-up">
                <img src="arvaci-ASSETS/bestseller2.jpg" alt="Best seller item 2 — replace with a real photo">

            </div>
            <div class="best-seller-card fade-up">
                <img src="arvaci-ASSETS/bestseller3.jpg" alt="Best seller item 3 — replace with a real photo">

            </div>
            <div class="best-seller-card fade-up">
                <img src="arvaci-ASSETS/bestseller4.jpg" alt="Best seller item 4 — replace with a real photo">

            </div>
            <div class="best-seller-card fade-up">
                <img src="arvaci-ASSETS/bestseller5.jpg" alt="Best seller item 5 — replace with a real photo">
                <h4>Cold Brew</h4>
            </div>
        </div>
    </div>

    <section class="dynamic-menu-section">
        <div class="menu-container">
            
            <div class="menu-tabs">
                <button class="tab-btn active" data-tab="drinks">Beverages</button>
                <button class="tab-btn" data-tab="food">Food & Extras</button>
            </div>

            <div class="menu-grid-split">
                <div>
                    <h3 id="left-column-title" class="column-title">Hot Drinks</h3>
                    <div id="left-menu-col"></div>
                </div>

                <div>
                    <h3 id="right-column-title" class="column-title">Iced Drinks</h3>
                    <div id="right-menu-col"></div>
                </div>
            </div>

        </div>
    </section>
